version: "3.8"

services:
  mongo:
    image: mongo:4.4
    restart: unless-stopped
    volumes:
      - cookpilot_mongo:/data/db
    networks:
      - cookpilot

  cookpilot:
    image: ghcr.io/OWNER/cookpilot:latest
    build: .
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      MONGO_URL: "mongodb://mongo:27017"
      DB_NAME: "cookpilot"
      CORS_ORIGINS: "*"
      JWT_SECRET: "${JWT_SECRET:-change-me-to-a-long-random-value}"
      JWT_ALGORITHM: "HS256"
      JWT_EXPIRES_HOURS: "720"
      COOKPILOT_ADMIN_EMAIL: "${COOKPILOT_ADMIN_EMAIL:-admin@cookpilot.local}"
      COOKPILOT_ADMIN_PASSWORD: "${COOKPILOT_ADMIN_PASSWORD:-CookPilot!2026}"
      COOKPILOT_PUBLIC_URL: "${COOKPILOT_PUBLIC_URL:-http://localhost:8001}"
      ARIA_SHARED_SECRET: "${ARIA_SHARED_SECRET:-}"
      APP_VERSION: "0.1.0"
    ports:
      - "8001:8001"
    volumes:
      - cookpilot_uploads:/data/uploads
    networks:
      - cookpilot

volumes:
  cookpilot_mongo:
  cookpilot_uploads:

networks:
  cookpilot:
